<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Entertainment For You</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:linear-gradient(#ffd6e7,#fff);
text-align:center;
color:#ff4f8b;
}

header{
padding:50px 20px;
}

button{
background:#ff69b4;
color:white;
border:none;
padding:15px 30px;
border-radius:30px;
font-size:18px;
cursor:pointer;
}

.hidden{
display:none;
}

img{
width:220px;
border-radius:20px;
margin:10px;
box-shadow:0 5px 15px rgba(0,0,0,.2);
}

.card{
background:white;
margin:20px;
padding:20px;
border-radius:20px;
box-shadow:0 5px 15px rgba(0,0,0,.15);
}
</style>
</head>

<body>

<header>
<h1>🌸 Entertainment For You 🌸</h1>
<p>Website kecil ini dibuat khusus buat seseorang yang spesial 💖</p>

<button onclick="buka()">Klik Aku 💌</button>
</header>

<div id="isi" class="hidden">

<div class="card">
<h2>✨ Haiii ✨</h2>
<p>Makasih udah mau buka website ini 🤍</p>
</div>

<div class="card">
<h2>📸 Foto 1</h2>
<img src="https://via.placeholder.com/220x300.png?text=Foto+1">
</div>

<div class="card">
<h2>📸 Foto 2</h2>
<img src="https://via.placeholder.com/220x300.png?text=Foto+2">
</div>

<div class="card">
<h2>💌 Kata-kata</h2>
<p>"Semoga hari kamu selalu seindah senyum kamu."</p>
</div>

</div>

<script>
function buka(){
document.getElementById("isi").classList.remove("hidden");
}
</script>

</body>
</html>
